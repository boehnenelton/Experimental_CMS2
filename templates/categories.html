{% extends "admin_base.html" %}

{% block content %}
<div class="content-card">
    <h1 class="emphasis">Content Categories</h1>
    <form action="/categories" method="POST" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;">
        <input type="text" name="name" placeholder="Category Name" class="c-input" required>
        <input type="text" name="slug" placeholder="slug-name" class="c-input" required>
        <input type="text" name="description" placeholder="Description" class="c-input">
        <select name="feed_type" class="c-input">
            <option value="article">Article Feed</option>
            <option value="gallery">Gallery</option>
            <option value="app">App Hub</option>
        </select>
        <button type="submit" style="background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">+ ADD</button>
    </form>

    <div id="tableContainer"></div>
</div>

<script>
    const doc = {{ cats_doc | tojson | safe }};
    
    window.app = {
        toggleSelectAll: (c) => {},
        setViewField: (i) => initTable(i),
        sortData: (i, a) => {}
    };

    function initTable(activeFieldIdx = null) {
        document.getElementById('tableContainer').innerHTML = HTML3_Table.render(doc, {
            recordType: 'Category',
            mobileMode: window.innerWidth < 768,
            activeFieldIdx: activeFieldIdx
        });
    }

    window.onload = () => initTable();
    window.onresize = () => initTable();
</script>

<style>
    .c-input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; outline: none; }
    .c-input:focus { border-color: var(--accent); }
    
    .c-bejson-table { width: 100%; color: #ccc; }
    .c-bejson-table__table { width: 100%; border-collapse: collapse; }
    .c-bejson-table__th { background: #111; padding: 12px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #666; border-bottom: 2px solid var(--border); }
    .c-bejson-table__td { padding: 12px; border-bottom: 1px solid #111; font-size: 0.85rem; }
</style>
{% endblock %}
