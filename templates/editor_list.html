{% extends "admin_base.html" %}

{% block content %}
<div class="content-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 class="emphasis" style="margin: 0;">Indexed Pages</h1>
        <a href="/new" style="background: var(--accent); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; font-size: 0.8rem;">+ CREATE PAGE</a>
    </div>

    <div id="tableContainer"></div>
</div>

<script>
    const doc = {{ pages_doc | tojson | safe }};
    
    // Mock app for table actions
    window.app = {
        toggleSelectAll: (c) => console.log('All:', c),
        setViewField: (i) => initTable(i),
        sortData: (i, a) => console.log('Sort:', i, a)
    };

    function initTable(activeFieldIdx = null) {
        const options = {
            recordType: 'Page',
            mobileMode: window.innerWidth < 768,
            activeFieldIdx: activeFieldIdx
        };
        
        document.getElementById('tableContainer').innerHTML = HTML3_Table.render(doc, options);
        
        // Add custom action buttons to the table if needed
        // (The JS renderer has basic action support, but we might want to override)
    }

    window.onload = () => initTable();
    window.onresize = () => initTable();
</script>

<style>
    /* Table Styling for HTML3 */
    .c-bejson-table { width: 100%; color: #ccc; }
    .c-bejson-table__table { width: 100%; border-collapse: collapse; }
    .c-bejson-table__th { background: #111; padding: 12px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #666; border-bottom: 2px solid var(--border); }
    .c-bejson-table__td { padding: 12px; border-bottom: 1px solid #111; font-size: 0.85rem; }
    .c-bejson-table__tr:hover { background: #151515; }
    .c-bejson-table__btn { background: #222; border: 1px solid #333; color: #fff; padding: 4px 8px; border-radius: 2px; cursor: pointer; font-size: 0.7rem; }
    .c-bejson-table__btn:hover { border-color: var(--accent); color: var(--accent); }
    .c-input { background: #111; border: 1px solid #333; color: #fff; padding: 4px; border-radius: 4px; }
</style>
{% endblock %}
